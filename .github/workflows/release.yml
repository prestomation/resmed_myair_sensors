name: Update Version and Create Zip on Release
on:
  workflow_dispatch:
  release:
    types: [published, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  update_version_and_create_zip:
    name: Update Version and Create Zip on Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          # Release events must package the release tag instead of a moving
          # target_commitish branch.
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Update Release Version Files
        if: ${{ github.event_name == 'release' && github.event.release.draft == false }}
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          python .github/scripts/update_release_version.py --tag-name "$TAG_NAME"

      - name: Commit & Push Version Changes
        if: ${{ github.event_name == 'release' && github.event.action == 'published' && github.event.release.draft == false && github.event.release.prerelease == false  }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ github.event.release.target_commitish }}
          commit_message: 'Updating to version ${{ github.event.release.tag_name }} [skip ci]'

      - name: Update Release with Version Changes Commit
        if: ${{ github.event_name == 'release' && github.event.action == 'published' && github.event.release.draft == false && github.event.release.prerelease == false  }}
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          git tag -f "$TAG_NAME"
          git push -f origin "$TAG_NAME"

      - name: Create Zip
        run: |
          cd ${{ github.workspace }}/custom_components/resmed_myair
          zip resmed_myair.zip -r ./

      - name: Upload Zip to Release
        if: ${{ github.event_name == 'release' && github.event.release.draft == false }}
        uses: softprops/action-gh-release@v3
        with:
          files: ./custom_components/resmed_myair/resmed_myair.zip
          tag_name: ${{ github.event.release.tag_name }}

      - name: Add Zip to Action
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v7
        with:
          name: resmed_myair
          path: ./custom_components/resmed_myair/resmed_myair.zip
          if-no-files-found: error
