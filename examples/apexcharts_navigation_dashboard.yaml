views:
  - title: CPAP
    type: sections
    sections:
      - type: grid
        cards:
          - type: grid
            columns: 5
            square: false
            cards:
              - type: button
                name: Prev
                icon: mdi:chevron-left
                tap_action:
                  action: perform-action
                  perform_action: script.cpap_usage_prev
              - type: button
                name: 1D
                icon: mdi:calendar-today
                tap_action:
                  action: perform-action
                  perform_action: script.cpap_usage_range_day
              - type: button
                name: 7D
                icon: mdi:calendar-week
                tap_action:
                  action: perform-action
                  perform_action: script.cpap_usage_range_week
              - type: button
                name: 30D
                icon: mdi:calendar-month
                tap_action:
                  action: perform-action
                  perform_action: script.cpap_usage_range_30d
              - type: button
                name: Next
                icon: mdi:chevron-right
                tap_action:
                  action: perform-action
                  perform_action: script.cpap_usage_next
          - type: custom:config-template-card
            entities:
              - input_select.cpap_usage_range
              - input_number.cpap_usage_page
              - sensor.cpap_usage_hours
            variables:
              range: states['input_select.cpap_usage_range'].state
              page: Number(states['input_number.cpap_usage_page'].state || 0)
              graph_span: |
                (() => {
                  if (vars.range === '1D') return '1d';
                  if (vars.range === '7D') return '7d';
                  return '30d';
                })()
              offset: |
                (() => {
                  const days = vars.range === '1D' ? vars.page : vars.range === '7D' ? vars.page * 7 : vars.page * 30;
                  return `-${days}d`;
                })()
            card:
              type: custom:apexcharts-card
              section_mode: true
              graph_span: "${vars.graph_span}"
              span:
                end: day
                offset: "${vars.offset}"
              header:
                show: true
                title: "${vars.range === '1D' ? 'CPAP Usage Hours - Day' : vars.range === '7D' ? 'CPAP Usage Hours - Week' : 'CPAP Usage Hours - 30 Days'}"
                show_states: false
                colorize_states: false
              series:
                - entity: sensor.cpap_usage_hours
                  name: Sleep Hours
                  type: column
                  float_precision: 2
                  show:
                    legend_value: false
                    in_header: false
                    as_duration: hour
                  data_generator: |
                    const points = (entity.attributes.daily_usage_hours || [])
                      .filter((point) => point.date)
                      .map((point) => {
                        const day = new Date(`${point.date}T00:00:00`);
                        return [day.getTime(), point.hours];
                      });
                    return points;
              apex_config:
                chart:
                  height: 320
                  toolbar:
                    show: false
                legend:
                  show: false
                tooltip:
                  y:
                    formatter: |
                      EVAL:function(value) {
                        const totalMinutes = Math.round(value * 60);
                        const hours = Math.floor(totalMinutes / 60);
                        const minutes = totalMinutes % 60;
                        return `${hours}h ${minutes.toString().padStart(2, "0")}m`;
                      }
                yaxis:
                  - decimalsInFloat: 2
                    title:
                      text: Sleep Duration
                    labels:
                      formatter: |
                        EVAL:function(value) {
                          const totalMinutes = Math.round(value * 60);
                          const hours = Math.floor(totalMinutes / 60);
                          const minutes = totalMinutes % 60;
                          return `${hours}h ${minutes.toString().padStart(2, "0")}m`;
                        }
